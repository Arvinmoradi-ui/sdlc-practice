{% extends "template_page.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h1 class="title">Login</h1>

<img style: width="100%" src="{{ url_for('static', filename='images/logo.png') }}" alt="EventMaster Logo">

        <div class="login-contents">
            <p style="margin-top: 10px;">
        <form action="/login" method="POST">

            <div style="margin-bottom: 20px;">
                <label for="user_email" style="color: black;">Email Address</label><br>
                <input type="email_2" id="user_email" name="user_email" required style="width: 20%; padding: 8px;">
            </div>

            <div style="margin-bottom: 25px;">
                <label for="password" style="color: black;">Password</label><br>
                <input type="password_2" id="password" name="password" required style="width: 20%; padding: 8px; align-content: Center;">
            </div>

            <button type="submit" class="button button-green" style="width: 20%;">Sign in</button>

        </form>

{% endblock %}
