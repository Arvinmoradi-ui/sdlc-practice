{% extends "template_page.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h1 class="title">Login</h1>

<img style="width:100%;" src="{{ url_for('static', filename='images/logo.png') }}" alt="EventMaster Logo">

        <div class="login-contents">
            <p style="margin-top: 10px;">
        <form action="/login" method="POST">

            <div style="margin-bottom: 20px;">
                <label for="user_email" style="color: black; font-weight: bold;">Email Address</label><br>
                <input type="email" id="user_email" name="user_email" class="login-input" required style="width: 20%; margin: 0 auto; display:block;">
            </div>

            <div style="margin-bottom: 25px;">
                <label for="password" style="color: black;">Password</label><br>
                <input type="password" id="password" name="password" class="login-input" required style="width: 20%; margin: 0 auto; display:block;">
            </div>

            <button type="submit" class="button button-green" style="width: 10%; margin: 0 auto; display:block;">Sign in</button>

        </form>

{% endblock %}
